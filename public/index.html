<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS // ACTIVATION SYSTEM v3</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Setup Modal -->
  <div class="setup-modal" id="setupModal">
    <div class="setup-box">
      <div class="setup-title">JARVIS CONFIGURATION</div>
      <div class="setup-subtitle">Configure your activation parameters</div>

      <label class="setup-label">DASHBOARD URL</label>
      <input type="url" id="dashboardUrl" class="setup-input" placeholder="http://192.168.1.66:8080" value="http://192.168.1.66:8080">

      <label class="setup-label">YOUTUBE SONG URL</label>
      <input type="url" id="youtubeUrl" class="setup-input" placeholder="https://www.youtube.com/watch?v=..." value="https://www.youtube.com/watch?v=BN1WwnEDWAM">
      <div class="setup-hint">Default: "Should I Stay or Should I Go" — The Clash</div>

      <label class="setup-label">AGENT VOICE</label>
      <div class="setup-toggle-row">
        <span class="setup-toggle-label" id="voiceToggleLabel">ENABLED</span>
        <label class="toggle-switch">
          <input type="checkbox" id="voiceEnabled">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div id="voiceOptions">
        <label class="setup-label-sm">AGENT NAME</label>
        <input type="text" id="agentName" class="setup-input" placeholder="JARVIS" value="JARVIS">

        <label class="setup-label-sm">VOICE (ELEVENLABS)</label>
        <select id="voiceSelect" class="setup-select">
          <option value="onwK4e9ZLuTAKqWW03F9">Daniel — British Broadcaster (JARVIS)</option>
          <option value="JBFqnCBsd6RMkjVDRZzb">George — British Storyteller</option>
          <option value="nPczCjzI2devNBz1zQrb">Brian — Deep, Resonant</option>
          <option value="cjVigY5qzO86Huf0OWal">Eric — Smooth, Trustworthy</option>
          <option value="pNInz6obpgDQGcFmaJgB">Adam — Dominant, Firm</option>
          <option value="Xb7hH8MSUJpSbSDYk0k2">Alice — British Female</option>
          <option value="EXAVITQu4vr4xnSDxMaL">Sarah — Confident Female</option>
          <option value="pFZP5JQG7iQjIQuC4Bku">Lily — Velvety British Female</option>
        </select>
        <div class="setup-hint" id="voiceHint">Powered by ElevenLabs AI</div>

        <div class="setup-row">
          <div class="setup-col">
            <label class="setup-label-sm">LANGUAGE</label>
            <select id="voiceLang" class="setup-select">
              <option value="es">Espanol</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>

        <label class="setup-label-sm">BRIEFING MESSAGE</label>
        <textarea id="voiceMessage" class="setup-input setup-textarea" rows="3" placeholder="Welcome message spoken on activation">Buenas noches senor. Jeffrey OS esta en linea. Todos los sistemas operativos. Dashboard conectado. Feed de noticias en vivo. Esperando sus ordenes, senor.</textarea>

        <button class="setup-btn-sm" id="previewVoiceBtn">PREVIEW VOICE</button>
      </div>

      <label class="setup-label">MIC SENSITIVITY</label>
      <input type="range" id="sensitivity" class="setup-range" min="0.05" max="0.8" step="0.01" value="0.15">
      <div class="setup-hint" id="sensitivityLabel">Threshold: 0.15</div>

      <button class="setup-btn" id="startBtn">INITIALIZE JARVIS</button>
    </div>
  </div>

  <!-- Matrix Rain -->
  <canvas id="matrix"></canvas>

  <!-- Scan Lines -->
  <div class="scanlines"></div>

  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- HUD -->
  <div class="hud" id="hud">
    <div class="hud-ring ring-outer"></div>
    <div class="hud-ring ring-mid"></div>
    <div class="hud-ring ring-inner"></div>

    <svg class="hud-arcs" viewBox="0 0 500 500">
      <circle cx="250" cy="250" r="230" fill="none" stroke="var(--cyan)" stroke-width="0.5" stroke-dasharray="20 10" opacity="0.3"/>
      <circle cx="250" cy="250" r="180" fill="none" stroke="var(--cyan)" stroke-width="0.5" stroke-dasharray="5 15" opacity="0.2"/>
      <g id="ticks" opacity="0.4"></g>
    </svg>

    <div class="hud-center">
      <div class="mic-visualizer" id="micVis">
        <canvas id="micCanvas" width="120" height="120"></canvas>
      </div>
      <div class="hud-status" id="hudStatus">STANDBY</div>
      <div class="hud-sub" id="hudSub">AWAITING ACTIVATION</div>
    </div>

    <div class="level-meter">
      <div class="level-fill" id="levelFill"></div>
      <div class="level-threshold" id="levelThreshold"></div>
    </div>
  </div>

  <!-- Terminal -->
  <div class="terminal" id="terminal">
    <div class="terminal-header">
      <span class="terminal-dot red"></span>
      <span class="terminal-dot yellow"></span>
      <span class="terminal-dot green"></span>
      <span class="terminal-title">JARVIS TERMINAL</span>
    </div>
    <div class="terminal-body" id="terminalBody"></div>
  </div>

  <!-- Logs Panel -->
  <div class="logs-panel" id="logsPanel">
    <div class="terminal-header">
      <span class="terminal-dot red"></span>
      <span class="terminal-dot yellow"></span>
      <span class="terminal-dot green"></span>
      <span class="terminal-title">SYSTEM LOGS</span>
      <span class="log-count" id="logCount">0</span>
    </div>
    <div class="logs-body" id="logsBody"></div>
  </div>

  <!-- Reveal -->
  <div class="reveal" id="reveal">
    <div class="reveal-line1 glitch" id="revealLine1" data-text="WAKE UP">WAKE UP</div>
    <div class="reveal-line2" id="revealLine2">DADDY'S HOME</div>
  </div>

  <!-- Data Panels -->
  <div class="panel panel-tl" id="panelTL">
    <div class="panel-title">SYS.STATUS</div>
    <div class="panel-content" id="panelTLData"></div>
  </div>
  <div class="panel panel-tr" id="panelTR">
    <div class="panel-title">NET.SCAN</div>
    <div class="panel-content" id="panelTRData"></div>
  </div>
  <div class="panel panel-bl" id="panelBL">
    <div class="panel-title">AUDIO.FEED</div>
    <div class="panel-content" id="panelBLData"></div>
  </div>
  <div class="panel panel-br" id="panelBR">
    <div class="panel-title">AI.CORE</div>
    <div class="panel-content" id="panelBRData"></div>
  </div>

  <!-- Voice indicator + controls -->
  <div class="voice-bar" id="voiceBar">
    <div class="voice-indicator" id="voiceIndicator">
      <div class="voice-wave"></div>
      <div class="voice-wave"></div>
      <div class="voice-wave"></div>
      <div class="voice-wave"></div>
      <div class="voice-wave"></div>
    </div>
    <span class="voice-label" id="voiceLabel">VOICE READY</span>
    <button class="voice-btn" id="voiceBtnToggle" title="Play / Pause briefing">PLAY BRIEFING</button>
  </div>

  <!-- Corner brackets -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- YouTube Player (controlled via IFrame API) -->
  <div id="ytContainer" style="position:fixed;bottom:-400px;left:-400px;width:320px;height:180px;z-index:-1;">
    <div id="ytPlayer"></div>
  </div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
